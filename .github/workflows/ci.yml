name: Tests & Profiling

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Pytest & Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies
      run: |
        uv sync --all-extras
        sudo apt-get install -y ffmpeg

    - name: Run tests with coverage
      run: |
        uv run pytest --cov=mini_timelapse --cov-report=xml --cov-report=term tests/

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: asgersvenning/mini_timelapse

  profile:
    name: Line-by-Line Profiling
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write 

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies & Scalene
      run: |
        uv sync --all-extras
        sudo apt-get install -y ffmpeg
        uv pip install scalene 

    - name: Determine Profile Directory
      id: profile-vars
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "dir=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "title=PR #${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
        else
          echo "dir=main" >> $GITHUB_OUTPUT
          echo "title=Main Branch" >> $GITHUB_OUTPUT
        fi

    - name: Run Scalene Profiling
      run: |
        mkdir -p public/profiles
        
        # 1. Run the profiler (Explicitly save as .json)
        uv run scalene run -o public/profiles/test_benchmarks.json --- -m pytest tests/test_benchmarks.py
        
        # 2. Convert the JSON profile to a self-contained HTML file
        uv run scalene view --html --standalone public/profiles/test_benchmarks.json
        
        # 3. Locate the generated HTML file and move it to our public directory.
        # This wildcard search catches both 'profile.html' and 'scalene-profile.html'
        html_file=$(find . -maxdepth 1 -name "*profile*.html" | head -n 1)
        if [ -n "$html_file" ]; then
          mv "$html_file" public/profiles/test_benchmarks.html
          echo "Successfully moved $html_file to public/profiles/"
        else
          echo "Warning: Scalene did not output an HTML file in the root directory!"
        fi
        
        # Create a dynamic index page based on the event
        echo "<h1>Benchmark Profiles for ${{ steps.profile-vars.outputs.title }}</h1>" > public/index.html
        echo "<ul><li><a href='profiles/test_benchmarks.html'>View test_benchmarks.py Profile</a></li></ul>" >> public/index.html
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        destination_dir: ${{ steps.profile-vars.outputs.dir }}

    - name: Comment PR with links
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: profile-links
        message: |
          ### 🚀 Performance Profiling Completed
          Interactive line-by-line profiling reports for this PR are ready!
          
          👉 **[Browse the PR Reports Here](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/)**