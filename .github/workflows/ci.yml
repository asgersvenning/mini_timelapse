name: Tests & Profiling

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Pytest & Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies
      run: |
        uv sync --all-extras
        sudo apt-get install -y ffmpeg

    - name: Run tests with coverage
      run: |
        uv run pytest --cov=mini_timelapse --cov-report=xml --cov-report=term tests/

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: asgersvenning/mini_timelapse

  profile:
    name: Line-by-Line Profiling
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write 

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies & pyinstrument
      run: |
        uv sync --all-extras
        sudo apt-get install -y ffmpeg
        uv pip install pyinstrument

    - name: Determine Profile Directory
      id: profile-vars
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "dir=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "title=PR #${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
        else
          echo "dir=main" >> $GITHUB_OUTPUT
          echo "title=Main Branch" >> $GITHUB_OUTPUT
        fi

    - name: Run Pyinstrument Profiling
      run: |
        mkdir -p public/profiles
        
        # Execute the test file directly to trigger the __main__ block
        uv run python tests/test_benchmarks.py
        
        # Create a dynamic index page linking to all generated profiles
        echo "<h1>Benchmark Profiles for ${{ steps.profile-vars.outputs.title }}</h1>" > public/index.html
        echo "<ul>" >> public/index.html
        
        # Loop through all generated HTML files and create links
        for file in public/profiles/*.html; do
          filename=$(basename "$file")
          name_without_ext="${filename%.html}"
          echo "<li><a href='profiles/$filename'>View $name_without_ext</a></li>" >> public/index.html
        done
        
        echo "</ul>" >> public/index.html
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        destination_dir: ${{ steps.profile-vars.outputs.dir }}
        keep_files: true

    - name: Comment PR with links
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: profile-links
        message: |
          ### 🚀 Performance Profiling Completed
          Interactive line-by-line profiling reports for this PR are ready!
          
          👉 **[Browse the PR Reports Here](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/)**