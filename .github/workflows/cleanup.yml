name: Cleanup PR Profiles

on:
  pull_request:
    types: [closed] # Triggers when a PR is merged OR closed without merging

jobs:
  cleanup:
    name: Delete PR Profiling Data
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the deletion commit to gh-pages

    steps:
      # 1. Check out the isolated gh-pages branch directly
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1 # We only need the latest commit

      # 2. Define the exact folder name to nuke
      - name: Determine PR Directory
        id: vars
        run: echo "dir=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      # 3. Perform the deletion and push
      - name: Remove PR Directory
        run: |
          # Check if the directory actually exists before trying to delete it
          # (Just in case the profiling action failed or never ran on this PR)
          if [ -d "${{ steps.vars.outputs.dir }}" ]; then
            
            # Configure git identity for the bot
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Remove the directory from git tracking
            git rm -r "${{ steps.vars.outputs.dir }}"
            
            # Commit the deletion
            git commit -m "chore: cleanup profiling data for merged/closed PR #${{ github.event.pull_request.number }}"
            
            # Push changes back to the gh-pages branch
            git push origin gh-pages
            
            echo "✅ Successfully deleted ${{ steps.vars.outputs.dir }}"
          else
            echo "⚠️ Directory ${{ steps.vars.outputs.dir }} not found. Nothing to clean up."
          fi